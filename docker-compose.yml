version: '3.8'

services:
  # The Setup Crew: Checks for existing config, creates it ONLY if missing
  samba-init:
    image: alpine:latest
    container_name: samba-init-${CLIENT_NAME}
    volumes:
      - /mnt/samba-vdi/${CLIENT_NAME}/config:/etc/samba
    command: sh -c "if [ ! -f /etc/samba/smb.conf ]; then touch /etc/samba/smb.conf; echo 'Created missing smb.conf'; else echo 'smb.conf already exists, skipping'; fi"

  # The Main Engine: The Samba Domain Controller
  samba-dc:
    image: nowsci/samba-domain:latest
    container_name: samba-${CLIENT_NAME}
    hostname: dc-${CLIENT_NAME}
    depends_on:
      samba-init:
        condition: service_completed_successfully
    environment:
      - DOMAIN=${CLIENT_DOMAIN}
      - DOMAINPASS=${ADMIN_PASSWORD}
      - HOSTIP=${STATIC_IP}
      - DNSFORWARDER=${ANCHOR_IP}
    dns:
      - 127.0.0.1
      - ${ANCHOR_IP}
    volumes:
      - /mnt/samba-vdi/${CLIENT_NAME}/config:/etc/samba
      - /mnt/samba-vdi/${CLIENT_NAME}/data:/var/lib/samba
    networks:
      tenant_net:
        ipv4_address: ${STATIC_IP}
    cap_add:
      - SYS_ADMIN
    restart: unless-stopped

networks:
  tenant_net:
    external: true
    name: ${NETWORK_NAME}
